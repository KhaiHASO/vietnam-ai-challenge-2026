name: "intent-driven"
description: "Intent-driven schema for end-to-end Spec-Driven Development"
artifacts:
  - name: "proposal"
    path: "docs/proposals/{change_id}_proposal.md"
    description: "Clarify user intent, initial design goals, and constraints. Must use grill-me skill first."
  - name: "specs"
    path: "docs/specs/{change_id}_specs.md"
    description: "Detailed behavior, interface contracts, and expected outputs."
  - name: "design"
    path: "docs/designs/{change_id}_design.md"
    description: "C4 Diagrams (Mermaid or ASCII) clarifying architecture and component mapping."
  - name: "adr"
    path: "docs/adr/{adr_id}_adr.md"
    description: "Architectural Decision Record preserving critical decisions permanently outside the change lifecycle."
  - name: "tasks"
    path: "docs/tasks/{change_id}_tasks.md"
    description: "Actionable execution plan divided into atomic implementation steps."
