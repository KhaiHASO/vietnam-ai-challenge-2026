name: production-gates

on:
  pull_request:
  push:
    branches: [TienThanh/RAG]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r backend/requirements-dev.txt
      - run: python -m pytest backend/tests tests/ai_layer/rag -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20.9", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci --legacy-peer-deps
      - run: npm run test
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: gitleaks/gitleaks-action@v2
      - run: python -m pip install pip-audit
      - run: pip-audit -r backend/requirements-dev.txt
      - run: npm audit --package-lock-only --audit-level=high
        working-directory: frontend
      - run: docker compose config

  docker-smoke:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-only-secret-that-is-at-least-thirty-two-characters
      MONGO_ROOT_PASSWORD: ci-mongo-password
      FPT_AI_FACTORY_API_KEY: ci-fpt-key
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: ci-admin-password
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose up --build -d
      - run: docker compose ps
      - run: curl --fail --retry 12 --retry-delay 5 http://localhost/health/live
      - if: always()
        run: docker compose down -v --remove-orphans
