services:
  nginx:
    image: nginx:1.27.4-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks: [edge, internal]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    expose: ["3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [internal]
    restart: unless-stopped

  backend: &backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: production
      DEMO_MODE: "false"
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_TENANT_ID: ${BOOTSTRAP_ADMIN_TENANT_ID:-single}
      PRIMARY_AI_PROVIDER: fpt-ai-factory
      FPT_AI_FACTORY_API_KEY: ${FPT_AI_FACTORY_API_KEY:-}
      FPT_AI_FACTORY_ENDPOINT: ${FPT_AI_FACTORY_ENDPOINT:-https://api.fpt.ai/v1/chat/completions}
      FPT_AI_FACTORY_MODEL_ID: ${FPT_AI_FACTORY_MODEL_ID:-qwen2.5-72b-instruct}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-cropdoctor}:${MONGO_ROOT_PASSWORD:-change-me}@mongodb:27017/cropdoctor_ai?authSource=admin
      DATABASE_NAME: cropdoctor_ai
      REDIS_URL: redis://redis:6379/0
      CHROMA_URL: http://chromadb:8000
      UPLOAD_DIR: /data/uploads
      PYTHONPATH: /app:/app/backend
    expose: ["8000"]
    volumes:
      - backend_data:/data
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks: [internal]
    restart: unless-stopped

  worker:
    <<: *backend
    command: ["python", "-m", "app.workers.main"]
    expose: []
    healthcheck:
      test: ["CMD", "python", "-c", "import os; assert os.getenv('CHROMA_URL')"]

  mongodb:
    image: mongo:7.0.15
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-cropdoctor}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-change-me}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval 'db.runCommand({ping:1}).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma@sha256:abcce7c335e2dab9f11ef629296f7309b09cb19ae4b34da32ac7e34ff5773140
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v2/heartbeat')\""]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [internal]
    restart: unless-stopped

networks:
  edge: {}
  internal:
    internal: true

volumes:
  backend_data: {}
  mongo_data: {}
  redis_data: {}
  chroma_data: {}
