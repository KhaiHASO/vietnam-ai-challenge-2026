services:
  mongo:
    image: mongo:7
    container_name: vaic-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=ollama
      - AI_MODEL_NAME=llama3.2
      - AI_BASE_URL=http://host.docker.internal:11434
      - VECTOR_DB_PATH=/app/data/vector_store.json
      - USE_MONGO=true
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=vaic2026
      - SKIP_RAG_SEED=true
    volumes:
      - ./backend:/app
      - ./ai_layer:/ai_layer
      - ./domains:/domains
      - backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
  mongo_data:
